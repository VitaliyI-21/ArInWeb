<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>WebAR — Капелюх на голові (з оклюдером)</title>

<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.1.5/dist/mindar-face-three.prod.js"></script>

<!-- Карта імпорту потрібна лише для GLTFLoader (модуль, відсутній у MindAR UMD-збірці) -->
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.150.0/build/three.module.js",
    "GLTFLoader": "https://unpkg.com/three@0.150.0/examples/jsm/loaders/GLTFLoader.js"
  }
}
</script>

<style>
  html, body {
    margin: 0; height: 100%; overflow: hidden;
    background: #050507; font-family: 'Segoe UI', Arial, sans-serif;
  }
  #overlay {
    position: absolute; top: 0; left: 0; width: 100%; z-index: 20;
    color: #e2e8f0; padding: 14px 16px; box-sizing: border-box;
    background: linear-gradient(to bottom, rgba(0,0,0,0.6), rgba(0,0,0,0));
    pointer-events: none; font-size: 13px; line-height: 1.5;
  }
  #overlay a { color: #a5b4fc; text-decoration: none; pointer-events: all; }
  #startBtn {
    position: fixed; inset: 0; z-index: 30;
    display: flex; align-items: center; justify-content: center;
    background: #050507;
  }
  #startBtn button {
    padding: 16px 30px; font-size: 17px; font-weight: 600;
    background: #2563eb; color: #fff; border: none; border-radius: 10px;
    cursor: pointer;
  }
  #startBtn button:hover { background: #1d4ed8; }
  #hint {
    position: absolute; bottom: 18px; left: 50%; transform: translateX(-50%);
    z-index: 20; color: #cbd5e1; font-size: 12px; text-align: center;
    background: rgba(0,0,0,0.45); padding: 8px 16px; border-radius: 8px;
    max-width: 90%;
  }

  #ar-container { position: fixed; inset: 0; width: 100vw; height: 100vh; overflow: hidden; }
  #ar-container video,
  #ar-container canvas {
    position: absolute !important;
    top: 50% !important; left: 50% !important;
    width: 100% !important; height: 100% !important;
    object-fit: cover !important;
    transform: translate(-50%, -50%) !important;
  }
</style>
</head>
<body>

  <div id="ar-container"></div>

  <div id="startBtn">
    <button id="startButtonInner">📷 Дозволити доступ до камери та запустити AR</button>
  </div>

  <div id="overlay">
    Наведіть камеру на своє обличчя · <a href="index.html">← на головну</a>
  </div>
  <div id="hint">🎩 Капелюх "одягнений" на голову з використанням оклюдера для коректного перекриття</div>

  <script type="module">
    import { GLTFLoader } from "GLTFLoader";

    const THREE = window.MINDAR.FACE.THREE;

    const loadGLTF = (path) => {
      const loader = new GLTFLoader();
      return new Promise((resolve, reject) => loader.load(path, resolve, undefined, reject));
    };

    const init = async () => {
      const mindarThree = new window.MINDAR.FACE.MindARThree({
        container: document.querySelector("#ar-container"),
        uiLoading: "no",
        uiScanning: "no",
        uiError: "no",
      });
      const { renderer, scene, camera } = mindarThree;
      renderer.setClearColor(0x000000, 0); // прозорий фон — щоб бачити відео з камери

      // ---- Освітлення (потрібне для MeshStandardMaterial моделей) ----
      const light1 = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1);
      scene.add(light1);
      const light2 = new THREE.DirectionalLight(0xffffff, 0.6);
      light2.position.set(-0.5, 1, 1);
      scene.add(light2);

      // ---------------------------------------------------------------
      // 1) Оклюдер голови — невидимий об'єкт, що "ховає" за собою
      //    частини капелюха, які мали би бути позаду голови
      // ---------------------------------------------------------------
      const occluder = await loadGLTF(
        "https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.1.4/examples/face-tracking/assets/sparkar/headOccluder.glb"
      );
      occluder.scene.scale.set(0.065, 0.065, 0.065);
      occluder.scene.position.set(0, -0.3, 0.15);
      occluder.scene.renderOrder = 0; // рендериться першим

      // Невидимий матеріал — оклюдер не малює колір, лише "займає" глибину (z-buffer)
      const occluderMaterial = new THREE.MeshBasicMaterial({ colorWrite: false });
      occluder.scene.traverse((o) => {
        if (o.isMesh) o.material = occluderMaterial;
      });

      const occluderAnchor = mindarThree.addAnchor(168); // точка між очима
      occluderAnchor.group.add(occluder.scene);

      // ---------------------------------------------------------------
      // 2) Модель капелюха — "одягається" на верхівку голови
      // ---------------------------------------------------------------
      const hat = await loadGLTF(
        "https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.1.4/examples/face-tracking/assets/hat/scene.gltf"
      );
      hat.scene.scale.set(0.35, 0.35, 0.35);
      hat.scene.position.set(0, 1.0, -0.5);
      hat.scene.renderOrder = 1; // рендериться другим (після оклюдера), тож видимий

      const hatAnchor = mindarThree.addAnchor(10); // точка верху голови
      hatAnchor.group.add(hat.scene);

      // ---------------------------------------------------------------
      await mindarThree.start();

      renderer.setAnimationLoop(() => {
        renderer.render(scene, camera);
      });
    };

    document.getElementById("startButtonInner").addEventListener("click", () => {
      document.getElementById("startBtn").remove();
      init();
    });
  </script>
</body>
</html>
