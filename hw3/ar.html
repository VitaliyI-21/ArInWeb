<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>WebAR — MindAR + Three.js (текстуровані об'єкти)</title>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.1.5/dist/mindar-image-three.prod.js"></script>
<style>
  html, body {
    margin: 0; height: 100%; overflow: hidden;
    background: #050507; font-family: 'Segoe UI', Arial, sans-serif;
  }
  #overlay {
    position: absolute; top: 0; left: 0; width: 100%; z-index: 20;
    color: #e2e8f0; padding: 14px 16px; box-sizing: border-box;
    background: linear-gradient(to bottom, rgba(0,0,0,0.6), rgba(0,0,0,0));
    pointer-events: none; font-size: 13px; line-height: 1.5;
  }
  #overlay a { color: #a5b4fc; text-decoration: none; pointer-events: all; }
  #startBtn {
    position: fixed; inset: 0; z-index: 30;
    display: flex; align-items: center; justify-content: center;
    background: #050507;
  }
  #startBtn button {
    padding: 16px 30px; font-size: 17px; font-weight: 600;
    background: #6366f1; color: #fff; border: none; border-radius: 10px;
    cursor: pointer;
  }
  #startBtn button:hover { background: #4f46e5; }
  #hint {
    position: absolute; bottom: 18px; left: 50%; transform: translateX(-50%);
    z-index: 20; color: #cbd5e1; font-size: 12px; text-align: center;
    background: rgba(0,0,0,0.45); padding: 8px 16px; border-radius: 8px;
    max-width: 90%;
  }
</style>
</head>
<body>

  <div id="startBtn">
    <button id="startButtonInner">📷 Дозволити доступ до камери та запустити AR</button>
  </div>

  <div id="overlay">
    Наведіть камеру на маркер <b>marker.png</b> · <a href="../index.html">← на головну</a>
  </div>
  <div id="hint">
    🟥 Куб (власне фото) — рух · 🌐 Сфера (текстура з GitHub) — обертання · 🔺 Конус (текстура з Picsum) — масштабування
  </div>

  <script>
    const THREE = window.MINDAR.IMAGE.THREE;

    const init = async () => {
      const mindarThree = new window.MINDAR.IMAGE.MindARThree({
        container: document.body,
        imageTargetSrc: "./targets.mind", // скомпільований файл вашого маркеру
      });
      const { renderer, scene, camera } = mindarThree;
      const anchor = mindarThree.addAnchor(0);

      // ---- Завантажувач текстур ----
      const loader = new THREE.TextureLoader();
      loader.setCrossOrigin("anonymous"); // потрібно для текстур з інших доменів (GitHub, Flickr)

      // а) Власний аватар/фото (локальний файл у репозиторії — замініть на своє!)
      const avatarTexture = loader.load("./avatar.png");

      // б) Зображення з GitHub (raw.githubusercontent.com — дозволяє CORS)
      const githubTexture = loader.load(
        "https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/textures/uv_grid_opengl.jpg"
      );

      // в) Зображення з довільного іншого ресурсу (Picsum Photos — стабільний CORS-дозволений хостинг)
      const externalTexture = loader.load(
        "https://picsum.photos/seed/webar-student/600/600"
      );

      // ---- Три довільні геометрії з MeshBasicMaterial ----

      // 1) Куб — текстура власного аватара/фото
      const box = new THREE.Mesh(
        new THREE.BoxGeometry(0.3, 0.3, 0.3),
        new THREE.MeshBasicMaterial({ map: avatarTexture })
      );
      box.position.set(0, 0.25, 0);

      // 2) Сфера — текстура з GitHub
      const sphere = new THREE.Mesh(
        new THREE.SphereGeometry(0.18, 32, 32),
        new THREE.MeshBasicMaterial({ map: githubTexture })
      );
      sphere.position.set(-0.4, 0.18, 0);

      // 3) Конус — текстура із зовнішнього ресурсу (Flickr)
      const cone = new THREE.Mesh(
        new THREE.ConeGeometry(0.18, 0.4, 32),
        new THREE.MeshBasicMaterial({ map: externalTexture })
      );
      cone.position.set(0.4, 0.2, 0);

      anchor.group.add(box, sphere, cone);

      anchor.onTargetFound = () => console.log("Маркер знайдено");
      anchor.onTargetLost = () => console.log("Маркер втрачено");

      await mindarThree.start();

      const clock = new THREE.Clock();
      let t = 0;

      renderer.setAnimationLoop(() => {
        const delta = clock.getDelta();
        t += delta;

        // а) ПЕРЕМІЩЕННЯ — куб плаває вгору-вниз над маркером
        box.position.y = 0.25 + Math.sin(t * 2) * 0.08;
        box.rotation.y += delta * 0.5; // легке обертання для кращого огляду текстури

        // б) ОБЕРТАННЯ — сфера безперервно обертається
        sphere.rotation.y += delta * 1.5;
        sphere.rotation.x += delta * 0.6;

        // в) МАСШТАБУВАННЯ — конус пульсує (збільшується/зменшується)
        const s = 1 + Math.sin(t * 3) * 0.3;
        cone.scale.set(s, s, s);

        renderer.render(scene, camera);
      });
    };

    // Запуск камери лише за дією користувача (вимога Safari/iOS)
    document.getElementById("startButtonInner").addEventListener("click", () => {
      document.getElementById("startBtn").remove();
      init();
    });
  </script>
</body>
</html>
