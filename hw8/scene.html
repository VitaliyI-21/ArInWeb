<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>WebAR — Сітка обличчя: 468 синіх сфер</title>

<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.1.5/dist/mindar-face-three.prod.js"></script>

<style>
  html, body {
    margin: 0; height: 100%; overflow: hidden;
    background: #050507; font-family: 'Segoe UI', Arial, sans-serif;
  }
  #overlay {
    position: absolute; top: 0; left: 0; width: 100%; z-index: 20;
    color: #e2e8f0; padding: 14px 16px; box-sizing: border-box;
    background: linear-gradient(to bottom, rgba(0,0,0,0.6), rgba(0,0,0,0));
    pointer-events: none; font-size: 13px; line-height: 1.5;
  }
  #overlay a { color: #a5b4fc; text-decoration: none; pointer-events: all; }
  #startBtn {
    position: fixed; inset: 0; z-index: 30;
    display: flex; align-items: center; justify-content: center;
    background: #050507;
  }
  #startBtn button {
    padding: 16px 30px; font-size: 17px; font-weight: 600;
    background: #2563eb; color: #fff; border: none; border-radius: 10px;
    cursor: pointer;
  }
  #startBtn button:hover { background: #1d4ed8; }
  #hint {
    position: absolute; bottom: 18px; left: 50%; transform: translateX(-50%);
    z-index: 20; color: #cbd5e1; font-size: 12px; text-align: center;
    background: rgba(0,0,0,0.45); padding: 8px 16px; border-radius: 8px;
    max-width: 90%;
  }
  #loadingNote {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    z-index: 15; color: #94a3b8; font-size: 13px; display: none;
  }

  #ar-container { position: fixed; inset: 0; width: 100vw; height: 100vh; overflow: hidden; }
  #ar-container video,
  #ar-container canvas {
    position: absolute !important;
    top: 50% !important; left: 50% !important;
    width: 100% !important; height: 100% !important;
    object-fit: cover !important;
    transform: translate(-50%, -50%) !important;
  }
</style>
</head>
<body>

  <div id="ar-container"></div>
  <div id="loadingNote">Завантаження моделі відстеження обличчя…</div>

  <div id="startBtn">
    <button id="startButtonInner">📷 Дозволити доступ до камери та запустити AR</button>
  </div>

  <div id="overlay">
    Наведіть камеру на своє обличчя · <a href="index.html">← на головну</a>
  </div>
  <div id="hint">🔵 468 синіх сфер прив'язані до кожної опорної точки обличчя (MediaPipe Face Mesh)</div>

  <script>
    const THREE = window.MINDAR.FACE.THREE;

    const init = async () => {
      document.getElementById("loadingNote").style.display = "block";

      const mindarThree = new window.MINDAR.FACE.MindARThree({
        container: document.querySelector("#ar-container"),
        uiLoading: "no",
        uiScanning: "no",
        uiError: "no",
      });
      const { renderer, scene, camera } = mindarThree;
      renderer.setClearColor(0x000000, 0); // прозорий фон — щоб бачити відео з камери

      document.getElementById("loadingNote").style.display = "none";

      // ---- Загальна геометрія та матеріал для всіх сфер (економія пам'яті) ----
      const sphereGeometry = new THREE.SphereGeometry(0.0035, 6, 6);
      const sphereMaterial = new THREE.MeshBasicMaterial({ color: 0x2563eb });

      // ---- Прив'язка синьої сфери до кожної з 468 опорних точок обличчя ----
      const TOTAL_LANDMARKS = 468;
      for (let i = 0; i < TOTAL_LANDMARKS; i++) {
        const anchor = mindarThree.addAnchor(i);
        const sphere = new THREE.Mesh(sphereGeometry, sphereMaterial);
        anchor.group.add(sphere);
      }

      await mindarThree.start();

      renderer.setAnimationLoop(() => {
        renderer.render(scene, camera);
      });
    };

    document.getElementById("startButtonInner").addEventListener("click", () => {
      document.getElementById("startBtn").remove();
      init();
    });
  </script>
</body>
</html>
